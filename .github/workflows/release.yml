name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: make test

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            archive_ext: tar.gz
          - goos: darwin
            goarch: amd64
            archive_ext: tar.gz
          - goos: linux
            goarch: amd64
            archive_ext: tar.gz
          - goos: windows
            goarch: amd64
            archive_ext: zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}"
          NAME="opensecrets_${VERSION}_${GOOS}_${GOARCH}"
          BIN_NAME="opensecrets"
          if [ "${GOOS}" = "windows" ]; then
            BIN_NAME="opensecrets.exe"
          fi

          mkdir -p "${NAME}"
          CGO_ENABLED=0 go build -ldflags "-X main.cVersion=${VERSION}" -o "${NAME}/${BIN_NAME}" main.go
          cp README.md LICENSE "${NAME}/"

          if [ "${{ matrix.archive_ext }}" = "zip" ]; then
            zip -qr "${NAME}.zip" "${NAME}"
          else
            tar -czf "${NAME}.tar.gz" "${NAME}"
          fi

          rm -rf "${NAME}"

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: opensecrets_*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate release notes
        id: notes
        env:
          CURRENT_TAG: ${{ github.ref_name }}
        run: |
          PREVIOUS_TAG="$(git tag --sort=version:refname | grep -vx "${CURRENT_TAG}" | tail -n 1 || true)"
          BODY_PATH="${RUNNER_TEMP}/release-notes.md"

          {
            echo "## Changes"
            echo

            if [ -n "${PREVIOUS_TAG}" ]; then
              git log --pretty=format:'- %s' "${PREVIOUS_TAG}..${CURRENT_TAG}"
            else
              git log --pretty=format:'- %s' "${CURRENT_TAG}"
            fi

            echo
          } > "${BODY_PATH}"

          echo "body_path=${BODY_PATH}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.notes.outputs.body_path }}
          files: dist/opensecrets_*
