name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: make test

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            archive_ext: tar.gz
          - goos: darwin
            goarch: amd64
            archive_ext: tar.gz
          - goos: linux
            goarch: amd64
            archive_ext: tar.gz
          - goos: windows
            goarch: amd64
            archive_ext: zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}"
          NAME="opensecrets_${VERSION}_${GOOS}_${GOARCH}"
          BIN_NAME="opensecrets"
          if [ "${GOOS}" = "windows" ]; then
            BIN_NAME="opensecrets.exe"
          fi

          mkdir -p "${NAME}"
          CGO_ENABLED=0 go build -ldflags "-X main.cVersion=${VERSION}" -o "${NAME}/${BIN_NAME}" main.go
          cp README.md LICENSE "${NAME}/"

          if [ "${{ matrix.archive_ext }}" = "zip" ]; then
            zip -qr "${NAME}.zip" "${NAME}"
          else
            tar -czf "${NAME}.tar.gz" "${NAME}"
          fi

          rm -rf "${NAME}"

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: opensecrets_*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/opensecrets_*
